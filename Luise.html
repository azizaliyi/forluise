<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For You 🌹</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Poppins', sans-serif;
  background: radial-gradient(circle at top, #ffe4ec, #ffd1dc, #cdb4ff);
}

.glow{
  position:absolute;
  width:420px;
  height:420px;
  background:rgba(255,255,255,0.12);
  border-radius:50%;
  filter:blur(60px);
}

/* falling petals */
.petal-fall{
  position:absolute;
  top:-50px;
  font-size:22px;
  animation:fall linear infinite;
  opacity:0.85;
}

.petal-fall:nth-child(1){left:5%;animation-duration:8s;}
.petal-fall:nth-child(2){left:15%;animation-duration:10s;animation-delay:1s;}
.petal-fall:nth-child(3){left:25%;animation-duration:7s;animation-delay:2s;}
.petal-fall:nth-child(4){left:40%;animation-duration:9s;animation-delay:0.5s;}
.petal-fall:nth-child(5){left:55%;animation-duration:11s;animation-delay:1.5s;}
.petal-fall:nth-child(6){left:70%;animation-duration:8s;animation-delay:2.5s;}
.petal-fall:nth-child(7){left:85%;animation-duration:10s;animation-delay:3s;}

@keyframes fall{
  0%{transform:translateY(-50px) rotate(0);opacity:0;}
  10%{opacity:1;}
  100%{transform:translateY(110vh) rotate(360deg);opacity:0;}
}

/* intro */
.intro{
  position:absolute;
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  backdrop-filter:blur(10px);
}

.intro h2{
  color:#fff;
  font-size:22px;
  font-family:'Poppins', sans-serif;
  font-weight:300;
  letter-spacing:1px;
}

.intro h1{
  color:#fff;
  font-size:46px;
  margin:10px 0 20px;
  font-family:'Playfair Display', serif;
  letter-spacing:1px;
}

button{
  padding:12px 26px;
  border:none;
  border-radius:30px;
  background:#ffffff;
  color:#d63384;
  font-size:16px;
  cursor:pointer;
  font-weight:500;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

button:hover{
  transform:scale(1.05);
}

.container{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

/* ROSE */
.rose{
  position:relative;
  width:220px;
  height:220px;
  animation:float 4s ease-in-out infinite;
}

.petal{
  position:absolute;
  width:100px;
  height:100px;
  background: radial-gradient(circle at 30% 30%, #ffd1dc, #e6397a);
  border-radius:60% 40% 60% 40%;
  box-shadow:0 10px 25px rgba(255,105,180,0.25);
  transform:scale(0);
  animation:bloom 1.2s ease forwards;
}

.petal:nth-child(1){top:0;left:60px;animation-delay:0.1s;}
.petal:nth-child(2){top:60px;left:0;animation-delay:0.3s;}
.petal:nth-child(3){top:60px;right:0;animation-delay:0.5s;}
.petal:nth-child(4){bottom:0;left:60px;animation-delay:0.7s;}
.petal:nth-child(5){top:40px;left:40px;animation-delay:0.9s;}
.petal:nth-child(6){top:40px;right:40px;animation-delay:1.1s;}

.center{
  position:absolute;
  width:75px;
  height:75px;
  background: radial-gradient(circle, #fff6a6, #ffb703);
  border-radius:50%;
  top:72px;
  left:72px;
  transform:scale(0);
  animation:bloom 1s ease forwards;
  animation-delay:1.3s;
}

@keyframes bloom{
  to{transform:scale(1);}
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* MESSAGE */
.message{
  margin-top:25px;
  max-width:340px;
  font-size:17px;
  font-family:'Poppins', sans-serif;
  color:rgba(255,255,255,0.95);
  text-shadow:0 2px 10px rgba(0,0,0,0.25);
  border-right:2px solid rgba(255,255,255,0.7);
  white-space:nowrap;
  overflow:hidden;
  min-height:60px;
}

</style>
</head>

<body>

<div class="glow" style="top:-120px;left:-120px;"></div>
<div class="glow" style="bottom:-120px;right:-120px;"></div>

<!-- falling petals -->
<div class="petal-fall">🌹</div>
<div class="petal-fall">🌸</div>
<div class="petal-fall">🌹</div>
<div class="petal-fall">🌸</div>
<div class="petal-fall">🌹</div>
<div class="petal-fall">🌸</div>
<div class="petal-fall">🌹</div>

<!-- intro -->
<div class="intro" id="intro">
  <h2>this is for u 💌</h2>
  <h1>Luise Wiesenthal</h1>
  <button onclick="show()">Click Here ✨</button>
</div>

<!-- main -->
<div class="container" id="main">
  <div class="rose">
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="center"></div>
  </div>

  <div class="message" id="message"></div>
</div>

<script>
function show(){
  document.getElementById('intro').style.display='none';
  document.getElementById('main').style.display='flex';
  typeWriter();
}

const text = "A simple rose, soft and quiet just for you ✨";
let i = 0;

function typeWriter(){
  if(i < text.length){
    document.getElementById("message").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 55);
  }
}
</script>

</body>
</html>
